<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">
        <div class="navbar">

            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/categories}">Categories</a>
<a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
<a sec:authorize="isAuthenticated()" th:href="@{/logout}">Logout</a>
        </div>
        <div class="forms">
            <div class="admin">

                <div th:if="${error == 'true'}" style="color:red; text-align:center; margin:10px;">
                Invalid email or password. Please try again.
                </div>
        
                <form th:action="@{/login}" method="post">
                    <h2>Login</h2>
                    <label for="email" >Email</label>
                    <input type="email" name="email" placeholder="Enter email" required>
                    <br><br>
                    <label for="password">Password</label>
                    <input type="password" name="password" placeholder="Password" required>
                    <br><br>
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
        
    </div>
</body>

</html>
